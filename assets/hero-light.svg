<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Utsav — I build things that should exist">
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }
    .disp { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; }
    @keyframes rise { from { transform: translateY(115%); } to { transform: translateY(0); } }
    @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-1401.6px); } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .r1 { animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both 0.15s; }
    .r2 { animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both 0.32s; }
    .bar { transform-origin: 70px 0; animation: grow 1s cubic-bezier(0.22, 1, 0.36, 1) both 0.95s; }
    .cur { animation: blink 1.1s steps(1) infinite; }
    .mq { animation: marquee 30s linear infinite; }
    .fade { animation: fadein 0.8s ease-out both 1.1s; }
  </style>

  <!-- cream paper -->
  <rect width="1200" height="340" fill="#f2ecdf"/>
  <!-- faint scanline grain -->
  <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#14120f" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="340" fill="url(#scan)"/>

  <!-- corner labels -->
  <text class="mono" x="70" y="52" font-size="13" letter-spacing="6" fill="#cf3e12">PORTFOLIO — JUSTUTSAV</text>
  <text class="mono" x="1130" y="52" font-size="13" letter-spacing="4" fill="#5d5647" text-anchor="end">BHUBANESWAR · IN</text>

  <!-- big display title, sliding up out of clip slots like the site hero -->
  <clipPath id="l1"><rect x="60" y="72" width="620" height="100"/></clipPath>
  <clipPath id="l2"><rect x="60" y="168" width="620" height="100"/></clipPath>
  <g clip-path="url(#l1)">
    <g class="r1">
      <text class="disp" x="70" y="156" font-size="92" letter-spacing="2" fill="#14120f">JUST</text>
    </g>
  </g>
  <g clip-path="url(#l2)">
    <g class="r2">
      <text class="disp" x="70" y="252" font-size="92" letter-spacing="2" fill="#14120f">UTSAV<tspan fill="#cf3e12">.</tspan></text>
    </g>
  </g>
  <!-- electric-blue waypoint, like the site's secondary accent -->
  <text class="disp fade" x="475" y="156" font-size="30" fill="#2f56c4">◆</text>

  <!-- growing accent bar -->
  <rect class="bar" x="70" y="268" width="340" height="6" fill="#cf3e12"/>

  <!-- tagline with blinking block cursor -->
  <text class="mono fade" x="70" y="300" font-size="18" letter-spacing="2" fill="#5d5647">i build things that should exist<tspan class="cur" fill="#cf3e12">▊</tspan></text>

  <!-- spinning music disk (site signature) -->
  <g transform="translate(1010,165)">
    <circle r="62" fill="#e7dfcf"/>
    <circle r="62" fill="none" stroke="#14120f" stroke-opacity="0.15"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
      <circle r="50" fill="none" stroke="#cf3e12" stroke-width="2.5" stroke-dasharray="18 12"/>
      <circle r="38" fill="none" stroke="#14120f" stroke-opacity="0.25" stroke-dasharray="3 7"/>
    </g>
    <circle r="16" fill="#f2ecdf"/>
    <circle r="4.5" fill="#d96a8b"/>
  </g>

  <!-- bottom marquee: two identical copies, seamless 1401.6px loop -->
  <g class="mq">
    <text class="mono" x="0" y="331" font-size="16" fill="#5d5647" opacity="0.65">GRIT · SPLITFREE · INVESTOR NEXUS · JUSTTRADE · ASTRO WALA · CLAUDE-ROUTE · WPM-OVERLAY · NODEPAD · JUSTWHISPER · 23 RELEASES · RS 75L+ MANAGED · </text>
    <text class="mono" x="1401.6" y="331" font-size="16" fill="#5d5647" opacity="0.65">GRIT · SPLITFREE · INVESTOR NEXUS · JUSTTRADE · ASTRO WALA · CLAUDE-ROUTE · WPM-OVERLAY · NODEPAD · JUSTWHISPER · 23 RELEASES · RS 75L+ MANAGED · </text>
  </g>
</svg>
