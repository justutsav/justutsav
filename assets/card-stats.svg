<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-label="GitHub stats">
  <rect width="495" height="195" rx="10" fill="#0e0d0b" stroke="#2a2622"/>
  <text x="26" y="38" font-family="Courier New,monospace" font-size="13" letter-spacing="3" fill="#ff5a24">UTSAV · BY THE NUMBERS</text>
  <line x1="26" y1="52" x2="300" y2="52" stroke="#2a2622"/>
  <text x="26" y="100" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="30" fill="#ff5a24">1848</text><text x="26" y="120" font-family="Courier New,monospace" font-size="11" letter-spacing="1.5" fill="#a49a88">CONTRIBS / YR</text>
  <text x="195" y="100" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="30" fill="#f2ede2">25</text><text x="195" y="120" font-family="Courier New,monospace" font-size="11" letter-spacing="1.5" fill="#a49a88">TOTAL STARS</text>
  <text x="26" y="165" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="30" fill="#f2ede2">15</text><text x="26" y="185" font-family="Courier New,monospace" font-size="11" letter-spacing="1.5" fill="#a49a88">REPOS SHIPPED</text>
  <text x="195" y="165" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="30" fill="#f2ede2">3</text><text x="195" y="185" font-family="Courier New,monospace" font-size="11" letter-spacing="1.5" fill="#a49a88">FOLLOWERS</text>

  <!-- current-streak ring -->
  <g transform="translate(410,97)">
    <circle r="58" fill="#191713"/>
    <circle r="58" fill="none" stroke="#2a2622"/>
    <circle r="47" fill="none" stroke="#ff5a24" stroke-width="3" stroke-dasharray="7 5" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
    </circle>
    <text y="-8" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="34" fill="#f2ede2">2</text>
    <text y="14" text-anchor="middle" font-family="Courier New,monospace" font-size="10" letter-spacing="1.5" fill="#ff5a24">DAY STREAK</text>
    <text y="32" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#a49a88">best 13</text>
  </g>
</svg>
